name: Teszt és GitHub Pages telepítés

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
    steps:
      - name: Google Client ID ellenőrzése
        run: |
          if [ -z "$VITE_GOOGLE_CLIENT_ID" ]; then
            echo "::error::A VITE_GOOGLE_CLIENT_ID repository variable nincs beállítva."
            exit 1
          fi

      - name: Forráskód letöltése
        uses: actions/checkout@v4

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Függőségek telepítése
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Unit és integrációs tesztek
        run: npm test

      - name: Chromium telepítése
        run: npx playwright install --with-deps chromium

      - name: Végponttól végpontig tartó tesztek
        run: npm run test:e2e -- --project=chromium

      - name: Production build
        run: npm run build

      - name: Pages artifact előkészítése
        uses: actions/configure-pages@v5

      - name: Pages artifact feltöltése
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages telepítés
        id: deployment
        uses: actions/deploy-pages@v4
